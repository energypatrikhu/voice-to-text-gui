stages:
  - release

variables:
  NODE_ENV: prod
  GITLAB_URL: https://gitlab.ep24.hu
  GITLAB_TOKEN: $CI_JOB_TOKEN

.release_template: &release_template
  stage: release
  image: mcr.microsoft.com/windows/servercore:ltsc2022
  tags:
    - windows
  before_script:
    - choco install -y bun
    - choco install -y git
  script:
    - bun install

release:
  <<: *release_template
  when: manual
  variables:
    APP_STATE: release
  script:
    - bun install
    - |
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@gitlab.ep24.hu"

      # Build Electron app with GitLab token available for publishing
      $env:GITLAB_TOKEN = "$env:CI_JOB_TOKEN"
      bun run pack:electron
      bun run pack:vite
      bun run build:electron:release

      # Create release using release-it
      bunx release-it --config release.release-it.json --gitlab.repository=$CI_PROJECT_PATH --ci
  artifacts:
    paths:
      - dist/
    expire_in: 30 days

release-beta:
  <<: *release_template
  when: manual
  variables:
    APP_STATE: beta
  script:
    - bun install
    - |
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@gitlab.ep24.hu"

      # Build Electron app with GitLab token available for publishing
      $env:GITLAB_TOKEN = "$env:CI_JOB_TOKEN"
      bun run pack:electron:beta
      bun run pack:vite:beta
      bun run build:electron:release:beta

      # Create pre-release using release-it
      bunx release-it --config preRelease.release-it.json --gitlab.repository=$CI_PROJECT_PATH --ci
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
